<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI TTS | Autonomous Voice Synthesis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-accent: #0f172a;
            --glass: rgba(30, 41, 59, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #c084fc;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(192, 132, 252, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: grid;
            place-items: center;
            box-shadow: var(--glow);
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 3rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            main { grid-template-columns: 1fr; }
        }

        /* --- Editor Section --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            padding: 1.5rem;
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        /* --- Controls --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="range"] {
            background: var(--bg-accent);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.8rem;
            color: var(--text-main);
            outline: none;
        }

        .btn-generate {
            margin-top: 2.5rem;
            width: 100%;
            padding: 1.2rem;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: var(--glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.1);
        }

        .btn-generate:active {
            transform: translateY(0) scale(0.98);
        }

        /* --- Sidebar / Visualizer --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .visualizer-container {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .bar {
            width: 4px;
            height: 20px;
            background: var(--primary);
            margin: 0 2px;
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-border);
        }

        .play-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--glass-border);
            display: grid;
            place-items: center;
        }

        /* --- Footer --- */
        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: auto;
        }

        .dodge-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            margin-top: 10px;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .generating .logo-icon {
            animation: pulse 1s infinite ease-in-out;
        }

        /* Custom Audio Player */
        .player-ui {
            margin-top: 2rem;
            padding: 1rem;
            background: var(--bg-accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--glass-border);
            border-radius: 3px;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 35%;
            background: var(--primary);
            border-radius: 3px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                </svg>
            </div>
            openai-tts
        </div>
        <div class="header-actions">
            <div style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--primary);">SYSTEM: READY</div>
        </div>
    </header>

    <main>
        <section class="editor-section">
            <div class="glass-panel">
                <div class="editor-header">
                    <label>Input Text</label>
                    <span id="char-count" style="font-size: 0.8rem; color: var(--text-dim);">0 / 4096</span>
                </div>
                <textarea id="text-input" placeholder="Enter text to convert into high-fidelity speech..."></textarea>
                
                <div class="controls-grid">
                    <div class="input-group">
                        <label>Voice</label>
                        <select id="voice-select">
                            <option value="alloy">Alloy (Neutral)</option>
                            <option value="echo">Echo (Confident)</option>
                            <option value="fable">Fable (British)</option>
                            <option value="onyx">Onyx (Deep)</option>
                            <option value="nova">Nova (Bright)</option>
                            <option value="shimmer">Shimmer (Smooth)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Model</label>
                        <select id="model-select">
                            <option value="tts-1">TTS-1 (Standard)</option>
                            <option value="tts-1-hd">TTS-1-HD (High Fidelity)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Speed: <span id="speed-val">1.0x</span></label>
                        <input type="range" id="speed-range" min="0.25" max="4.0" step="0.25" value="1.0">
                    </div>
                    <div class="input-group">
                        <label>Format</label>
                        <select id="format-select">
                            <option value="mp3">MP3</option>
                            <option value="opus">Opus</option>
                            <option value="aac">AAC</option>
                            <option value="flac">FLAC</option>
                        </select>
                    </div>
                </div>

                <button class="btn-generate" id="generate-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 3l14 9-14 9V3z"/>
                    </svg>
                    GENERATE SPEECH
                </button>

                <div class="player-ui" id="player-ui" style="display: none;">
                    <div class="play-icon" style="cursor: pointer; background: var(--primary);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
                    <span style="font-size: 0.8rem; font-family: 'JetBrains Mono';">00:12</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="cursor:pointer;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="glass-panel" style="padding: 1.5rem;">
                <label style="margin-bottom: 1rem; display: block;">Live Spectrum</label>
                <div class="visualizer-container" id="visualizer">
                    <!-- Bars generated by JS -->
                </div>
            </div>

            <div class="glass-panel" style="flex: 1;">
                <label style="margin-bottom: 1.5rem; display: block;">Generation History</label>
                <div class="history-list">
                    <div class="history-item">
                        <div class="play-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-dim)"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.9rem; font-weight: 600;">Welcome message...</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim);">Nova • 0.8s ago</div>
                        </div>
                    </div>
                    <div class="history-item">
                        <div class="play-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-dim)"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.9rem; font-weight: 600;">Technical specs read...</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim);">Onyx • 5m ago</div>
                        </div>
                    </div>
                    <div class="history-item">
                        <div class="play-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-dim)"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.9rem; font-weight: 600;">Autonomous project overview</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim);">Alloy • 12m ago</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <footer>
        <p>© 2026 Autonomous Neural Systems</p>
        <div class="dodge-badge">
            <span style="font-size: 1.2rem;">🐕</span>
            <span>Dodge Integrated</span>
        </div>
    </footer>

    <script>
        // Init Visualizer
        const visualizer = document.getElementById('visualizer');
        const barCount = 40;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
            bars.push(bar);
        }

        function animateVisualizer() {
            bars.forEach(bar => {
                const height = Math.random() * (isGenerating ? 80 : 20) + 10;
                bar.style.height = `${height}px`;
                bar.style.opacity = isGenerating ? '1' : '0.3';
            });
            requestAnimationFrame(animateVisualizer);
        }
        animateVisualizer();

        // UI Logic
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const generateBtn = document.getElementById('generate-btn');
        const speedRange = document.getElementById('speed-range');
        const speedVal = document.getElementById('speed-val');
        const playerUi = document.getElementById('player-ui');
        const pFill = document.getElementById('p-fill');
        
        let isGenerating = false;

        textInput.addEventListener('input', () => {
            const len = textInput.value.length;
            charCount.textContent = `${len} / 4096`;
            charCount.style.color = len > 4000 ? '#ef4444' : '#94a3b8';
        });

        speedRange.addEventListener('input', () => {
            speedVal.textContent = `${speedRange.value}x`;
        });

        generateBtn.addEventListener('click', () => {
            if (textInput.value.trim() === "") {
                textInput.style.borderColor = "#ef4444";
                setTimeout(() => textInput.style.borderColor = "var(--glass-border)", 1000);
                return;
            }

            isGenerating = true;
            document.body.classList.add('generating');
            generateBtn.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
                SYNTHESIZING...
            `;
            generateBtn.style.opacity = "0.7";
            generateBtn.disabled = true;

            // Mock generation delay
            setTimeout(() => {
                isGenerating = false;
                document.body.classList.remove('generating');
                generateBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 3l14 9-14 9V3z"/>
                    </svg>
                    GENERATE SPEECH
                `;
                generateBtn.style.opacity = "1";
                generateBtn.disabled = false;
                
                playerUi.style.display = "flex";
                pFill.style.width = "0%";
                
                // Animate player progress
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 1;
                    pFill.style.width = `${progress}%`;
                    if (progress >= 100) clearInterval(interval);
                }, 120);

                // Add to history
                const historyList = document.querySelector('.history-list');
                const newItem = document.createElement('div');
                newItem.className = 'history-item';
                newItem.style.opacity = '0';
                newItem.style.transform = 'translateX(-20px)';
                newItem.innerHTML = `
                    <div class="play-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-dim)"><path d="M8 5v14l11-7z"/></svg></div>
                    <div style="flex: 1;">
                        <div style="font-size: 0.9rem; font-weight: 600;">${textInput.value.substring(0, 25)}...</div>
                        <div style="font-size: 0.7rem; color: var(--text-dim);">${document.getElementById('voice-select').value} • Just now</div>
                    </div>
                `;
                historyList.prepend(newItem);
                setTimeout(() => {
                    newItem.style.transition = "all 0.4s ease";
                    newItem.style.opacity = '1';
                    newItem.style.transform = 'translateX(0)';
                }, 50);

            }, 2500);
        });

        // Interactive subtle mouse tracking for glass effect
        document.addEventListener('mousemove', (e) => {
            const panels = document.querySelectorAll('.glass-panel');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            panels.forEach(panel => {
                const rect = panel.getBoundingClientRect();
                const dx = e.clientX - (rect.left + rect.width / 2);
                const dy = e.clientY - (rect.top + rect.height / 2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 500) {
                    panel.style.boxShadow = `${dx/20}px ${dy/20}px 32px rgba(0, 0, 0, 0.4)`;
                }
            });
        });

    </script>
</body>
</html>
